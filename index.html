}

.section-label {

.stats-grid {

.stat-card {

/* 針對主頁引導選單的成員微調按鈕 */
.welcome-chips-container {

  border: 1px solid var(--border-strong);

  color: var(--text-primary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}
.welcome-chip:hover {

  background: var(--bg-accent);

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBnelYJnphxiM_ErbgyQx-5g3LiwDVqNUs",
  authDomain: "maple-lucky-tracker-7e739.firebaseapp.com",
  databaseURL: "https://maple-lucky-tracker-7e739-default-rtdb.firebaseio.com",
  projectId: "maple-lucky-tracker-7e739",
  storageBucket: "maple-lucky-tracker-7e739.firebasestorage.app",
  messagingSenderId: "408553743543",
  appId: "1:408553743543:web:f98b0f605a15e852865932"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 完整清單
const PRIZES = [
  "挑戰者幸運票 50個","挑戰者幸運票 100個",
  "挑戰者幸運票 500個",
  "秋日森林魔能髮夾交換券","秋日森林魔能套裝交換券","秋日森林魔能連衣裙交換券",
  "秋日森林魔能鞋子交換券","魔法沉睡的森林交換券","森林裡的魔法古書包交換券",
  "卡勒馬星力17星賦予卷軸(200級)","永恆傳說Boss飾品選擇箱",
  "傳說潛在能力賦予卷軸100%","永恆的黃金發條",
  "永恆傳說頂級培羅德飾品選擇箱","永恆傳說米特拉的憤怒選擇箱",
  "永恆星力20星強化券(200級)","永恆18星永恆防具箱","永恆20星漆黑的Boss飾品箱"
];

// 11 項廣播核心大獎
const BROADCAST_ITEMS = [
  "永恆20星漆黑的Boss飾品箱",
  "永恆星力20星強化券(200級)",
  "挑戰者幸運票 500個",
  "永恆18星永恆防具箱",
  "永恆傳說米特拉的憤怒選擇箱",
  "永恆傳說Boss飾品選擇箱",
  "永恆的黃金發條",
  "挑戰者幸運票 100個",
  "挑戰者幸運票 50個",
  "傳說潛在能力賦予卷軸100%",
  "永恆傳說頂級培羅德飾品選擇箱"
];

function genWeeks(){
  const weeks=[];
  let d=new Date(2024,5,24);
  const end=new Date(2024,9,20);
  let w=1;
  while(d<=end){
    const e=new Date(d);e.setDate(e.getDate()+6);
    const fmt=dt=>`${dt.getMonth()+1}/${dt.getDate()}`;
    weeks.push({label:`第${w}週 (${fmt(d)}–${fmt(e)})`,key:`w${w}`});
    d.setDate(d.getDate()+7);w++;
  }
  return weeks;
}
const WEEKS=genWeeks();

let state={
  players:[], 
  records:{}, 
  activePlayer:'',
  activeWeek:WEEKS[0].key
};

db.ref('tracker-state').on('value', (snapshot) => {
  const val = snapshot.val();
  if (val) {
    state.players = val.players || [];
    state.records = val.records || {};
    
    // ✨ 核心邏輯：讀取目前瀏覽器記錄的「本地使用者」
    const savedLocalPlayer = localStorage.getItem('my_lucky_player_id');
    
    if (state.players.length > 0) {
      // 如果本地有紀錄，且這個人還在雲端名單裡，就直接帶入
      if (savedLocalPlayer && state.players.find(p => p.id === savedLocalPlayer)) {
        state.activePlayer = savedLocalPlayer;
      } else {
        // 如果本地沒紀錄，或者紀錄的人被刪除了，就不自動預設任何人（強制顯示歡迎畫面）
        state.activePlayer = '';
      }
    } else {
      state.activePlayer = '';
    }
  } else {
    state.players = [];
    state.records = {};
    state.activePlayer = '';
  }
  
  document.getElementById('loading-screen').style.opacity = '0';
  setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 300);
  
  const filterSel = document.getElementById('stats-player-filter');
  if(filterSel) {
    const currentSel = filterSel.value;
    let html = `<option value="all">ʕʘ̅͜ʘ̅ʔ 整體累計</option>`;
    state.players.forEach(p => {
      html += `<option value="${p.id}">👤 ${p.name} 的個人明細</option>`;
    });
    filterSel.innerHTML = html;
    if(currentSel && [...filterSel.options].some(o => o.value === currentSel)) {
      filterSel.value = currentSel;
    }
  }

  render();
});

function syncToCloud() {
  db.ref('tracker-state').set({
    players: state.players,
    records: state.records
  });
}

function getRecordObj(pid, wk){
  if(!pid) return {};
  if(!state.records[pid]) state.records[pid]={};
  if(!state.records[pid][wk]) state.records[pid][wk]={};
  return state.records[pid][wk];
}

function changeCount(prize, delta, event){
  if(event) event.stopPropagation();
  if(!state.activePlayer) return; 
  
  const rec = getRecordObj(state.activePlayer, state.activeWeek);
  const current = rec[prize] || 0;
  const next = current + delta;
  
  if(next <= 0){
    delete state.records[state.activePlayer][state.activeWeek][prize];
  } else {
    state.records[state.activePlayer][state.activeWeek][prize] = next;
  }
  syncToCloud(); 
}

function renderPlayers(){
  const el=document.getElementById('player-chips');
  // ✨ 如果本地還沒選擇或創立角色，上方就不顯示切換按鈕（保持畫面乾淨）
  if(!state.activePlayer || !state.players || !state.players.length) {
    el.innerHTML = ``;
    return;
  }
  
  // 加上一個「切換/登出」的灰色小按鈕，讓想換角色的人可以隨時點擊回首頁
  let html = state.players.map(p=>`
    <div class="player-chip ${p.id===state.activePlayer?'active':''}" onclick="selectPlayer('${p.id}')">
      ${p.name}
    </div>`).join('');
    
  html += `<div class="player-chip" style="background:#e2e8f0; border-color:#cbd5e0; color:var(--text-secondary);" onclick="logoutPlayer()">👤 換人記錄</div>`;
  el.innerHTML = html;
}

function selectPlayer(id){
  state.activePlayer = id;
  localStorage.setItem('my_lucky_player_id', id); // ✨ 記住這台電腦是誰
  renderPrizes();
  renderPlayers();
}

function logoutPlayer(){
  localStorage.removeItem('my_lucky_player_id'); // ✨ 忘記這台電腦是誰
  state.activePlayer = '';
  renderPrizes();
  renderPlayers();
}

function renderWeeks(){
  const sel=document.getElementById('week-select');
  if(!sel.innerHTML) {
    sel.innerHTML=WEEKS.map(w=>`<option value="${w.key}" ${w.key===state.activeWeek?'selected':''}>${w.label}</option>`).join('');
  }
  sel.onchange=()=>{state.activeWeek=sel.value;renderPrizes();};
}

function renderPrizes(){
  state.activeWeek=document.getElementById('week-select').value;
  
  // ✨ 當「這台電腦」還沒綁定角色時，不論雲端有沒有人，都顯示最貼心的引導主頁！
  if(!state.activePlayer) {
    let existPlayersHtml = '';
    
    // 如果雲端本來就有其他朋友建立的名字，就做成小按鈕讓新朋友挑選，免得重複建帳號
    if(state.players && state.players.length > 0) {
      existPlayersHtml = `
        <p style="font-size: 13px; color: var(--text-secondary); margin: 1.5rem 0 0.5rem; font-weight:600;">你是已經在名單內的人嗎？直接點選你：</p>
        <div class="welcome-chips-container">
          ${state.players.map(p => `<div class="welcome-chip" onclick="selectPlayer('${p.id}')">👤 ${p.name}</div>`).join('')}
        </div>
        <div style="border-top:1px dashed var(--border-strong); margin: 1.5rem 0; height:0;"></div>
        <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 0.8rem; font-weight:600;">如果是第一次來的新朋友，請在下面輸入你的名字：</p>
      `;
    } else {
      existPlayersHtml = `
        <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 1.5rem;">
          目前雲端還沒有任何人建立成員喔，輸入你的名字來當開荒第一人吧：
        </p>
      `;
    }

    document.getElementById('prize-grid').innerHTML = `
      <div class="empty" style="grid-column: span 3; padding: 3rem 1.5rem; background: var(--surface-2); border: 1px dashed var(--border-strong); border-radius: 12px; margin-top: 1rem; width: 100%;">
        <p style="font-size: 16px; color: var(--text-primary); font-weight: 600; margin-bottom: 8px;">
          ʕ̡̢̡ʘ̅͟͜͡ʘ̲̅ʔ̢̡̢ 一起來看看S3上了幾次廣
        </p>
        
        ${existPlayersHtml}
        
        <div class="add-player-row" style="max-width: 400px; margin: 0 auto; margin-bottom: 0;">
          <input type="text" id="first-player-input" placeholder="例如：小楓" onkeydown="if(event.key==='Enter')addFirstPlayer()">
          <button class="btn primary" onclick="addFirstPlayer()">創建新角色</button>
        </div>
      </div>
    `;
    return;
  }
  
  const rec = getRecordObj(state.activePlayer, state.activeWeek);
  document.getElementById('prize-grid').innerHTML=PRIZES.map(p=>{
    const count = rec[p] || 0;
    const safePrize = p.replace(/'/g,"\\'");
    return `<div class="prize-row ${count > 0 ? 'active-count' : ''}" onclick="changeCount('${safePrize}', 1)">
      <label>${p}</label>
      <div class="counter-box">
        ${count > 0 ? `<div class="counter-btn" onclick="changeCount('${safePrize}', -1, event)">-</div>` : ''}
        <div class="counter-val">${count}</div>
        <div class="counter-btn" onclick="changeCount('${safePrize}', 1, event)">+</div>
      </div>
    </div>`;
  }).join('');
}

function renderStats(){
  const filterMode = document.getElementById('stats-player-filter')?.value || 'all';
  const el=document.getElementById('stats-cards');
  const tbl=document.getElementById('stats-table');
  const probBody = document.getElementById('global-prob-tbody');
  
  if(!state.players || !state.players.length) {
    el.innerHTML = `<div class="stat-card"><div class="stat-label">合計</div><div class="stat-val">0 次</div></div>`;
    tbl.querySelector('thead').innerHTML = '';
    tbl.querySelector('tbody').innerHTML = `<tr><td colspan="4" class="empty">暫無成員資料</td></tr>`;
    probBody.innerHTML = `<tr><td colspan="3" class="empty">暫無數據</td></tr>`;
    return;
  }

  let totalBroadcastCount = 0; 
  let broadcastPrizeCounts = {};
  let playerBroadcastCounts = {}; 
  
  BROADCAST_ITEMS.forEach(p => broadcastPrizeCounts[p] = 0);
  
  state.players.forEach(p => {
    playerBroadcastCounts[p.id] = 0;
    WEEKS.forEach(w => {
      const rec = getRecordObj(p.id, w.key);
      Object.entries(rec).forEach(([pName, c]) => {
        if (BROADCAST_ITEMS.includes(pName)) {
          broadcastPrizeCounts[pName] += c;
          totalBroadcastCount += c;
          playerBroadcastCounts[p.id] += c;
        }
      });
    });
  });

  if (filterMode === 'all') {
    document.getElementById('stats-card-title').textContent = '全體成員累積統計 (僅計算藍廣)';
    document.getElementById('stats-rank-title').textContent = '這些都是藍廣';
    document.getElementById('stats-detail-title').textContent = '全體成員 × 每週完整明細';

    el.innerHTML = state.players.map(p => `
      <div class="stat-card">
        <div class="stat-label">${p.name} 的藍廣總數</div>
        <div class="stat-val" style="color:var(--text-success)">${playerBroadcastCounts[p.id]} 次</div>
      </div>
    `).join('');

    const sorted = Object.entries(broadcastPrizeCounts).filter(([_, c]) => c > 0).sort((a,b)=>b[1]-a[1]);
    if(sorted.length === 0) {
      probBody.innerHTML = `<tr><td colspan="3" class="empty">目前尚無任何廣播品項紀錄數據 😶</td></tr>`;
    } else {
      probBody.innerHTML = sorted.map(([name, c]) => {
        const pct = totalBroadcastCount > 0 ? ((c / totalBroadcastCount) * 100).toFixed(1) : 0;
        return `<tr><td style="font-weight: 500;">${name}</td><td style="font-weight:600">${c} 個</td><td><div class="prob-bar-container"><div class="prob-bar-bg"><div class="prob-bar-fill" style="width:${pct}%"></div></div><span class="prob-text">${pct}%</span></div></td></tr>`;
      }).join('');
    }

    tbl.querySelector('thead').innerHTML = `<tr><th>成員</th><th>週次</th><th>獲得品項內容 (數量)</th><th>藍廣單週累計</th></tr>`;
    let html = '';
    state.players.forEach(p => {
      WEEKS.forEach(w => {
        const rec = getRecordObj(p.id, w.key);
        const allItems = Object.entries(rec).filter(([n, _]) => PRIZES.includes(n));
        
        if(allItems.length === 0) {
          html += `<tr><td>${p.name}</td><td style="color:var(--text-secondary)">${w.label}</td><td><span class="badge badge-none">—</span></td><td>0</td></tr>`;
        } else {
          let broadcastSum = 0;
          const badges = allItems.map(([n, c]) => { 
            if(BROADCAST_ITEMS.includes(n)) {
              broadcastSum += c; 
              return `<span class="badge badge-prize" style="margin:2px; background:var(--bg-success); color:var(--text-success); border-color:var(--border-success); font-weight:600;">${n} x${c}</span>`; 
            }
            return `<span class="badge badge-none" style="margin:2px; opacity:0.6;">${n} x${c}</span>`; 
          }).join(' ');
          
          const rowClass = broadcastSum > 0 ? 'class="highlight"' : '';
          html += `<tr ${rowClass}><td>${p.name}</td><td style="color:var(--text-secondary)">${w.label}</td><td>${badges}</td><td style="font-weight:600; color:var(--text-success)">${broadcastSum}</td></tr>`;
        }
      });
    });
    tbl.querySelector('tbody').innerHTML = html;

  } else {
    const targetPlayer = state.players.find(p => p.id === filterMode);
    if (!targetPlayer) return;

    document.getElementById('stats-card-title').textContent = `${targetPlayer.name} 的數據記錄 (僅計廣播品項)`;
    document.getElementById('stats-rank-title').textContent = `${targetPlayer.name} 的藍廣分佈`;
    document.getElementById('stats-detail-title').textContent = `${targetPlayer.name} 的每週紀錄明細`;

    let pBroadcastPrizeCounts = {};
    BROADCAST_ITEMS.forEach(p => pBroadcastPrizeCounts[p] = 0);
    
    WEEKS.forEach(w => {
      const rec = getRecordObj(targetPlayer.id, w.key);
      Object.entries(rec).forEach(([n, c]) => {
        if (BROADCAST_ITEMS.includes(n)) pBroadcastPrizeCounts[n] += c;
      });
    });

    const pBroadcastTotal = playerBroadcastCounts[targetPlayer.id] || 0;

    el.innerHTML = `
      <div class="stat-card" style="grid-column: span 3;">
        <div class="stat-label">累積抽中廣播大獎總次數</div>
        <div class="stat-val" style="color:var(--text-success); font-size: 26px;">${pBroadcastTotal} 次</div>
      </div>
    `;

    const pSorted = Object.entries(pBroadcastPrizeCounts).filter(([_, c]) => c > 0).sort((a,b)=>b[1]-a[1]);
    if(pSorted.length === 0) {
      probBody.innerHTML = `<tr><td colspan="3" class="empty">該成員目前尚未有任何廣播品項紀錄 😶</td></tr>`;
    } else {
      probBody.innerHTML = pSorted.map(([name, c]) => {
        const pct = pBroadcastTotal > 0 ? ((c / pBroadcastTotal) * 100).toFixed(1) : 0;
        return `<tr><td style="font-weight: 500;">${name}</td><td style="font-weight:600">${c} 個</td><td><div class="prob-bar-container"><div class="prob-bar-bg"><div class="prob-bar-fill" style="width:${pct}%"></div></div><span class="prob-text">${pct}%</span></div></td></tr>`;
      }).join('');
    }

    tbl.querySelector('thead').innerHTML = `<tr><th>週次</th><th>獲得品項內容 (數量)</th><th>廣播品項單週累計</th></tr>`;
    let html = '';
    WEEKS.forEach(w => {
      const rec = getRecordObj(targetPlayer.id, w.key);
      const allItems = Object.entries(rec).filter(([n, _]) => PRIZES.includes(n));
      
      if(allItems.length === 0) {
        html += `<tr><td style="color:var(--text-secondary)">${w.label}</td><td><span class="badge badge-none">—</span></td><td>0</td></tr>`;
      } else {
        let broadcastSum = 0;
        const badges = allItems.map(([n, c]) => { 
          if(BROADCAST_ITEMS.includes(n)) {
            broadcastSum += c; 
            return `<span class="badge badge-prize" style="margin:2px; background:var(--bg-success); color:var(--text-success); border-color:var(--border-success); font-weight:600;">${n} x${c}</span>`; 
          }
          return `<span class="badge badge-none" style="margin:2px; opacity:0.6;">${n} x${c}</span>`; 
        }).join(' ');
        
        const rowClass = broadcastSum > 0 ? 'class="highlight"' : '';
        html += `<tr ${rowClass}><td style="color:var(--text-secondary)">${w.label}</td><td>${badges}</td><td style="font-weight:600; color:var(--text-success)">${broadcastSum}</td></tr>`;
      }
    });
    tbl.querySelector('tbody').innerHTML = html;
  }
}

function renderManage(){
  const el = document.getElementById('player-manage-list');
  if(!state.players || !state.players.length) {
    el.innerHTML = `<div style="color:var(--text-muted); font-size:13px; padding:10px 0;">目前無任何成員。</div>`;
    return;
  }
  el.innerHTML=state.players.map(p=>`
    <div class="prize-row" style="margin-bottom:6px;grid-column:span 1; cursor:default;">
      <label style="flex:1">${p.name}</label>
      <button class="btn" onclick="removePlayer('${p.id}')" style="padding:4px 8px;font-size:12px">刪除</button>
    </div>`).join('');
}

function addPlayer(){
  const inp=document.getElementById('new-player-input');
  const name=inp.value.trim();
  if(!name)return;
  const id='p'+Date.now();
  state.players.push({id,name});
  inp.value='';
  selectPlayer(id); // ✨ 新增時同步綁定本地記憶
  syncToCloud();
}

function addFirstPlayer(){
  const inp = document.getElementById('first-player-input');
  const name = inp.value.trim();
  if(!name) return;
  const id = 'p' + Date.now();
  state.players.push({id, name});
  selectPlayer(id); // ✨ 新增時同步綁定本地記憶
  syncToCloud();
}

function removePlayer(id){
  state.players=state.players.filter(p=>p.id!==id);
  if(state.records[id]) delete state.records[id];
  if(state.activePlayer===id){
    logoutPlayer(); // ✨ 如果刪掉的是自己，就登出清除本地記憶
  } else {
    syncToCloud();
  }
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>{
    const tabs=['record','stats','players'];
    el.classList.toggle('active',tabs[i]===t);
  });
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='stats') renderStats();
  if(t==='players') renderManage();
}

function render(){renderPlayers();renderWeeks();renderPrizes();}
</script>
